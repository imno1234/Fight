<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FIGHT</title>

  <style>
    :root{--v:1vmin;}
    html,body{margin:0;height:100%;overflow:hidden;background:#111;overflow-x:hidden;}
    #c{position:fixed;inset:0}

    h1{
      position:absolute;
      left:50%;top:50%;
      transform:translate(-50%,-50%);
      margin:0;
      font:900 calc(var(--v)*15) Impact,Anton,sans-serif;
      color:#fff;
      letter-spacing:calc(var(--v)/2);
      text-shadow:
        0 calc(var(--v)*1) 0 rgba(255,80,80,.28),
        0 0 calc(var(--v)*2) rgba(255,70,70,.12);
      user-select:none;
    }

    .prompt-box{
      position:fixed;
      left:50%;
      bottom:10%;
      transform:translateX(-50%);
      width:min(calc(var(--v)*50),50vw);
      height:calc(var(--v)*5);
      background:#fff;
      border-radius:999px;
      display:flex;
      align-items:center;
      padding:0 12px;
      box-shadow:0 calc(var(--v)*1) calc(var(--v)*4) rgba(0,0,0,.45);
      border:1px solid rgba(255,255,255,.08);
      z-index:100;
    }

    .prompt-box input{
      flex:1;
      height:100%;
      border:none;
      outline:none;
      background:transparent;
      color:#111216;
      font-size:calc(var(--v)*2.5);
      padding:0 calc(var(--v)*2);
    }

    .prompt-box input::placeholder{color:#5b586d;}

    .copy-btn{
      position:fixed;
      z-index:200;
      padding:calc(var(--v)*0.5) calc(var(--v)*1.5);
      border-radius:999px;
      background:#fff;
      color:#111216;
      font-size:calc(var(--v)*2);
      cursor:pointer;
      user-select:none;
    }

    .crop-frame{
      position:fixed;
      z-index:50;
      pointer-events:none;

      border:1px solid #fff;
      border-radius:calc(var(--v)*2);

      box-sizing:border-box;
    }
  </style>
</head>

<body>
<canvas id="c"></canvas>
<h1 id="title">FIGHT</h1>

<div class="prompt-box">
  <input id="prompt" type="text" placeholder="FIGHT">
</div>

<div class="copy-btn">COPY</div>
<div class="crop-frame"></div>

<script>
const input=document.getElementById("prompt");
const title=document.getElementById("title");
const c=document.getElementById('c'),x=c.getContext('2d');
const copyBtn=document.querySelector(".copy-btn");
const frame = document.querySelector(".crop-frame");

const seed=Math.random()*Math.PI;
let v;

function sync(){
  const vw = innerWidth * 0.01;
  const vh = innerHeight * 0.01;
  v = Math.min(vw, vh);
  document.documentElement.style.setProperty("--v", v+"px");
  c.width=innerWidth;
  c.height=innerHeight;

  const size = Math.min(innerWidth, innerHeight);
  const btn = copyBtn;

  const cx = innerWidth / 2;
  const cy = innerHeight / 2;

  const x = cx + size*0.42;
  const y = cy - size*0.42;
  const fx = cx - size*0.45;
  const fy = cy - size*0.45;

  btn.style.left = x + "px";
  btn.style.top = y + "px";

  btn.style.transform = "translate(-100%, 0%)";

  frame.style.left = fx + "px";
  frame.style.top = fy + "px";
  frame.style.width = size*0.9 + "px";
  frame.style.height = size*0.9 + "px";
}

window.addEventListener("resize", sync);
window.addEventListener("orientationchange", sync);
sync();

/* ======================
   SCROLL LOCK (mobile fix)
====================== */
let scrollY = 0;

input.addEventListener("focus", () => {
  scrollY = window.scrollY;
  document.body.style.position = "fixed";
  document.body.style.top = `-${scrollY}px`;
  document.body.style.width = "100%";

  setTimeout(() => {
    input.scrollIntoView({ block: "center", inline: "nearest" });
  }, 100);
});

input.addEventListener("blur", () => {
  document.body.style.position = "";
  document.body.style.top = "";
  document.body.style.width = "";
  window.scrollTo(0, scrollY);
});

/* ======================
   NOISE
====================== */
function fbm(a,b){
 let t=0,f=.012,amp=1,s=0;
 for(let i=0;i<4;i++){
   t+=Math.sin(a*f+Math.sin(b*f*1.7+i+seed)+seed)*amp;
   s+=amp;
   f*=2;
   amp*=.5;
 }
 return t/s;
}

/* ======================
   RENDER
====================== */
function draw(){
 const w=c.width,h=c.height;

 x.fillStyle="#111216";
 x.fillRect(0,0,w,h);

 const band=v*2.5;

 for(let xx=-80;xx<w+80;xx+=band){
   x.beginPath();

   for(let yy=-10;yy<=h+10;yy+=v){
     const off=fbm(yy,xx)*v*6+Math.sin(yy*.003+seed)*v*0.6;
     const xoff=xx+off;

     if(yy===0) x.moveTo(xoff,yy);
     else x.lineTo(xoff,yy);
   }

   x.lineTo(w+100,h+10);
   x.lineTo(w+100,-10);
   x.closePath();

   x.fillStyle=((xx/band)&1)?"#5b586d":"#111216";
   x.fill();
 }

 requestAnimationFrame(draw);
}
draw();

/* ======================
   TEXT SYNC
====================== */
input.oninput = () =>
  title.textContent = input.value.toUpperCase() || "FIGHT";

/* ======================
   CENTER SQUARE EXPORT
====================== */
function exportCenterSquare(){
  const size = Math.min(c.width, c.height);
  const sx = (c.width - size)/2;
  const sy = (c.height - size)/2;

  const out = document.createElement("canvas");
  const ctx = out.getContext("2d");

  out.width = size;
  out.height = size;

  ctx.drawImage(c, sx, sy, size, size, 0, 0, size, size);

  // h1 overlay rendering
  const style = getComputedStyle(title);

  ctx.font = `${style.fontWeight} ${style.fontSize} ${style.fontFamily}`;
  ctx.fillStyle = style.color;
  ctx.textAlign="center";
  ctx.textBaseline="middle";

  const x0=size/2, y0=size/2;

  ctx.shadowColor="rgba(255,80,80,.28)";
  ctx.shadowOffsetY=10;
  ctx.shadowBlur=0;
  ctx.fillText(title.textContent, x0, y0);

  ctx.shadowColor="rgba(255,70,70,.12)";
  ctx.shadowBlur=16;
  ctx.fillText(title.textContent, x0, y0);

  return out;
}

/* ======================
   CLIPBOARD COPY
====================== */
copyBtn.addEventListener("click", async () => {
  const canvas = exportCenterSquare();

  canvas.toBlob(async (blob) => {
    await navigator.clipboard.write([
      new ClipboardItem({ "image/png": blob })
    ]);
  });
});
</script>

</body>
</html>
