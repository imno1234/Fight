<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fight Demo</title>
  <style>
    html,body{margin:0;height:100%;overflow:hidden;background:#111;}
    #c{position:fixed;inset:0}
    h1{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    margin:0;font:900 200px Impact,Anton,sans-serif;color:#fff;
    letter-spacing:3px;
    text-shadow:0 10px 0 rgba(255,80,80,.28),0 0 16px rgba(255,70,70,.12);
    user-select:none}
    #fontSlider{position:fixed;left:40px;top:50%;transform:translateY(-50%);
    width:min(40px,7vw);height:min(420px,50vh);z-index:1000;}
    #fontSlider, #fontSlider *{user-select:none;-webkit-user-select:none;
    -moz-user-select:none;-webkit-user-drag:none;}
    #sliderTrack{position:absolute;left:50%;transform:translateX(-50%);
    width:0;height:0;
    border-left:min(10px,1vw) solid transparent;
    border-right:min(10px,1vw) solid transparent;
    border-top:min(420px,50vh) solid rgba(255,255,255,.18);}
    #sliderKnob{position:absolute;left:50%;transform:translate(-50%,-50%);
    width:22px;height:22px;border-radius:50%;background:white;
    cursor:pointer;box-shadow:0 0 10px rgba(255,255,255,.6);}
    .prompt-box{position:fixed;left:50%;bottom:60px;transform:translateX(-50%);
    width:min(330px,50vw);height:40px;
    background:#fff; /*#2b2b2b;*/
    border-radius:999px;
    display:flex;align-items:center;padding:0 12px;
    box-shadow:0 10px 30px rgba(0,0,0,.45);
    border:1px solid rgba(255,255,255,.08);
    z-index:100;}
    .prompt-box input{flex:1;height:100%;border:none;outline:none;
    background:transparent;color:#111216;font-size:20px;padding:0 16px;}
    .prompt-box input::placeholder{color:#5b586d;}
  </style>
</head>
<body>
<canvas id="c"></canvas><h1 id="title">FIGHT</h1>
<div id="fontSlider">
    <div id="sliderTrack"></div>
    <div id="sliderKnob"></div>
</div>
<div class="prompt-box">
    <input id="prompt" type="text" placeholder="FIGHT, 단어 알지? 싸워, 나가서 싸워.">
</div>
<script>
const input=document.getElementById("prompt");
const title=document.getElementById("title");
const c=document.getElementById('c'),x=c.getContext('2d');

const knob=document.getElementById("sliderKnob");
const slider=document.getElementById("fontSlider");

let dragging=false;
let norm = 0.5;

const MIN=100;
const MAX=300;

// 초기 위치
knob.style.top="50%";

knob.addEventListener("pointerdown", (e) => {
    dragging = true;
    knob.setPointerCapture(e.pointerId);
    e.preventDefault();
});

knob.addEventListener("pointermove", (e) => {
    if (!dragging) return;
    const r = slider.getBoundingClientRect();
    let y = e.clientY - r.top;
    y = Math.max(0, Math.min(r.height, y));
    knob.style.top = y + "px";
    norm = y / r.height;
    const t = 1 - norm;
    const size = MIN + t * (MAX - MIN);
    title.style.fontSize = size + "px";
});

knob.addEventListener("pointerup", (e) => {
    dragging = false;
    knob.releasePointerCapture(e.pointerId);
});

knob.addEventListener("pointercancel", () => {
    dragging = false;
});

function rs(){c.width=innerWidth;c.height=innerHeight}
addEventListener("resize", () => {
    rs();
    knob.style.top = (norm * slider.getBoundingClientRect().height) + "px";
});
rs();
function fbm(a,b){
 let t=0,f=.012,amp=1,s=0;
 for(let i=0;i<4;i++){t+=Math.sin(a*f+Math.sin(b*f*1.7+i))*amp;s+=amp;f*=2;amp*=.5;}
 return t/s;
}
function draw(){
 const w=c.width,h=c.height;
 x.fillStyle="#111216";x.fillRect(0,0,w,h);
 const band=24;
 for(let xx=-80;xx<w+80;xx+=band){
   x.beginPath();
   for(let yy=0;yy<=h;yy+=6){
      const off=fbm(yy,xx)*50+Math.sin(yy*.003)*5;
      const xoff=xx+off;
      if(yy===0)x.moveTo(xoff,yy); else x.lineTo(xoff,yy);
   }
   x.lineTo(w+100,h);x.lineTo(w+100,0);x.closePath();
   x.fillStyle=((xx/band)&1)?"#5b586d":"#111216";
   x.fill();
 }
 requestAnimationFrame(draw);
}
draw();
input.oninput=()=>title.textContent=input.value.toUpperCase()||"FIGHT";
</script>
</body></html>
